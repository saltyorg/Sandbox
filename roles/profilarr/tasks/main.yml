---
- name: Check for existing Profilarr v1 installation
  ansible.builtin.stat:
    path: "{{ profilarr_role_paths_location }}/profilarr.db"
  register: profilarr_v1_installation_check

- name: Abort if Profilarr v1 installation exists
  ansible.builtin.fail:
    msg: |
      Existing Profilarr v1 installation detected.

      Profilarr v2 requires a fresh installation.
      Migration from v1 to v2 is not supported.

      Before continuing:
        1. Back up /opt/profilarr
        2. Remove the existing /opt/profilarr directory
        3. Rerun the role to install Profilarr v2

      For more information, see:
        https://v2.dictionarry.dev/?section=before-you-start  

  when: profilarr_v1_installation_check.stat.exists

- name: Add DNS record
  ansible.builtin.include_tasks: "{{ resources_tasks_path }}/dns/tasker.yml"
  vars:
    dns_record: "{{ lookup('role_var', '_dns_record') }}"
    dns_zone: "{{ lookup('role_var', '_dns_zone') }}"
    dns_proxy: "{{ lookup('role_var', '_dns_proxy') }}"

- name: Remove existing Docker container
  ansible.builtin.include_tasks: "{{ resources_tasks_path }}/docker/remove_docker_container.yml"

- name: Create directories
  ansible.builtin.include_tasks: "{{ resources_tasks_path }}/directories/create_directories.yml"

- name: Create Docker container
  ansible.builtin.include_tasks: "{{ resources_tasks_path }}/docker/create_docker_container.yml"
